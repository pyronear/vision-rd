truncate:
  max_frames: 20

tubes:
  iou_threshold: 0.2
  max_misses: 2

build_tubes:
  min_tube_length: 4
  min_detected_entries: 2

model_input:
  context_factor: 1.5
  patch_size: 224

train_mean_pool:
  arch: mean_pool
  backbone: resnet18
  hidden_dim: 128
  max_frames: 20
  batch_size: 32
  num_workers: 4
  learning_rate: 0.001
  weight_decay: 0.01
  max_epochs: 30
  early_stop_patience: 5
  seed: 42

train_gru:
  arch: gru
  backbone: resnet18
  hidden_dim: 128
  num_layers: 1
  bidirectional: false
  max_frames: 20
  batch_size: 32
  num_workers: 4
  learning_rate: 0.001
  weight_decay: 0.01
  max_epochs: 30
  early_stop_patience: 5
  seed: 42

train_gru_seed43:
  arch: gru
  backbone: resnet18
  hidden_dim: 128
  num_layers: 1
  bidirectional: false
  max_frames: 20
  batch_size: 32
  num_workers: 4
  learning_rate: 0.001
  weight_decay: 0.01
  max_epochs: 30
  early_stop_patience: 5
  seed: 43

train_gru_seed44:
  arch: gru
  backbone: resnet18
  hidden_dim: 128
  num_layers: 1
  bidirectional: false
  max_frames: 20
  batch_size: 32
  num_workers: 4
  learning_rate: 0.001
  weight_decay: 0.01
  max_epochs: 30
  early_stop_patience: 5
  seed: 44

train_gru_convnext:
  arch: gru
  backbone: convnext_tiny
  finetune: false
  hidden_dim: 128
  num_layers: 1
  bidirectional: false
  max_frames: 20
  batch_size: 32
  num_workers: 4
  learning_rate: 0.001
  weight_decay: 0.01
  max_epochs: 30
  early_stop_patience: 5
  seed: 42

train_gru_finetune:
  arch: gru
  backbone: resnet18
  finetune: true
  finetune_last_n_blocks: 1
  backbone_lr: 0.00001
  hidden_dim: 128
  num_layers: 1
  bidirectional: false
  max_frames: 20
  batch_size: 32
  num_workers: 4
  learning_rate: 0.001
  weight_decay: 0.01
  max_epochs: 30
  early_stop_patience: 5
  seed: 42

train_gru_convnext_finetune:
  arch: gru
  backbone: convnext_tiny
  finetune: true
  finetune_last_n_blocks: 1
  backbone_lr: 0.00001
  hidden_dim: 128
  num_layers: 1
  bidirectional: false
  max_frames: 20
  batch_size: 32
  num_workers: 4
  learning_rate: 0.001
  weight_decay: 0.01
  max_epochs: 30
  early_stop_patience: 5
  seed: 42

augment:
  enabled: true
  spatial:
    flip_prob: 0.5
    rotation_deg: 5.0
    scale_range: [0.9, 1.1]
    translate_frac: 0.05
  photometric:
    brightness_range: [0.8, 1.2]
    contrast_range: [0.8, 1.2]
    saturation_range: [0.8, 1.2]
  temporal:
    subseq_prob: 0.5
    subseq_min_len: 4
    stride_prob: 0.25
    frame_drop_prob: 0.15
    min_valid_after_drop: 4
