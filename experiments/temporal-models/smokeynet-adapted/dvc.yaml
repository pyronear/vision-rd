        - src/smokeynet_adapted/temporal_classifier.py
        - src/smokeynet_adapted/lit_temporal.py
        - src/smokeynet_adapted/dataset.py
        - data/06_models/mean_pool/best_checkpoint.pt
        - data/05_model_input/${item}
        - data/08_reporting/tubes/${item}
      params:
        - train_mean_pool
      outs:
        - data/08_reporting/${item}/mean_pool/errors
        - data/08_reporting/${item}/mean_pool/predictions.json:
            cache: false
      metrics:
        - data/08_reporting/${item}/mean_pool/metrics.json:
            cache: false
      plots:
        - data/08_reporting/${item}/mean_pool/pr_curve.png
        - data/08_reporting/${item}/mean_pool/roc_curve.png
        - data/08_reporting/${item}/mean_pool/confusion_matrix.png
        - data/08_reporting/${item}/mean_pool/confusion_matrix_normalized.png

