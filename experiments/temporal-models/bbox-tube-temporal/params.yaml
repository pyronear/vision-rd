# Keys prefixed with `_` are shared defaults consumed via YAML merge keys
# (`<<: *anchor`). They are NOT DVC stage parameters — no dvc.yaml stage lists
# them under `params:`, so stage hashing ignores them.
#
# Caveat: `dvc exp run -S train_gru.seed=100` rewrites this file and would
# materialize the merged dict (losing the anchor). That's fine for one-off
# experiments; to keep anchors intact, edit params.yaml by hand.

prepare:
  model_repo: "pyronear/yolo11s_nimble-narwhal_v6.0.0"
  model_filename: "best.pt"

truncate:
  max_frames: 20

tubes:
  iou_threshold: 0.2
  max_misses: 2

build_tubes:
  min_tube_length: 4
  min_detected_entries: 2

model_input:
  context_factor: 1.5
  patch_size: 224

_train_defaults: &train_defaults
  hidden_dim: 128
  max_frames: 20
  batch_size: 32
  num_workers: 4
  learning_rate: 0.001
  weight_decay: 0.01
  max_epochs: 30
  early_stop_patience: 5
  seed: 42

_gru_defaults: &gru_defaults
  <<: *train_defaults
  arch: gru
  backbone: resnet18
  num_layers: 1
  bidirectional: false

train_mean_pool:
  <<: *train_defaults
  arch: mean_pool
  backbone: resnet18

train_gru:
  <<: *gru_defaults

train_gru_seed43:
  <<: *gru_defaults
  seed: 43

train_gru_seed44:
  <<: *gru_defaults
  seed: 44

train_gru_convnext:
  <<: *gru_defaults
  backbone: convnext_tiny
  finetune: false

train_gru_finetune:
  <<: *gru_defaults
  finetune: true
  finetune_last_n_blocks: 1
  backbone_lr: 0.00001

train_gru_convnext_finetune:
  <<: *gru_defaults
  backbone: convnext_tiny
  finetune: true
  finetune_last_n_blocks: 1
  backbone_lr: 0.00001

train_gru_convnext_base_finetune:
  <<: *gru_defaults
  backbone: convnext_base
  batch_size: 16
  finetune: true
  finetune_last_n_blocks: 1
  backbone_lr: 0.00001

_vit_defaults: &vit_defaults
  <<: *train_defaults
  arch: transformer
  batch_size: 16
  learning_rate: 0.0001
  weight_decay: 0.05
  max_epochs: 30
  global_pool: token
  img_size: 224
  transformer_num_layers: 2
  transformer_num_heads: 6
  transformer_ffn_dim: 1536
  transformer_dropout: 0.1
  use_cosine_warmup: true
  warmup_frac: 0.05

train_vit_dinov2_frozen:
  <<: *vit_defaults
  backbone: vit_small_patch14_dinov2.lvd142m
  finetune: false

train_vit_dinov2_finetune:
  <<: *vit_defaults
  backbone: vit_small_patch14_dinov2.lvd142m
  finetune: true
  finetune_last_n_blocks: 1
  backbone_lr: 0.00001

train_vit_in21k_finetune:
  <<: *vit_defaults
  backbone: vit_small_patch16_224.augreg_in21k_ft_in1k
  finetune: true
  finetune_last_n_blocks: 1
  backbone_lr: 0.00001

augment:
  enabled: true
  spatial:
    flip_prob: 0.5
    rotation_deg: 5.0
    scale_range: [0.9, 1.1]
    translate_frac: 0.05
  photometric:
    brightness_range: [0.8, 1.2]
    contrast_range: [0.8, 1.2]
    saturation_range: [0.8, 1.2]
  temporal:
    subseq_prob: 0.5
    subseq_min_len: 4
    stride_prob: 0.25
    frame_drop_prob: 0.15
    min_valid_after_drop: 4

package:
  target_recall: 0.95
  infer_min_tube_length: 2
  infer:
    confidence_threshold: 0.1
    iou_nms: 0.2
    image_size: 1024
    pad_to_min_frames: 20
    pad_strategy: symmetric
