stages:
  truncate:
    foreach:
      - train
      - val
    do:
      cmd: >-
        uv run python scripts/truncate_sequences.py
        --input-dir data/01_raw/datasets_full/${item}
        --output-dir data/01_raw/datasets/${item}
        --max-frames ${truncate.max_frames}
      deps:
        - scripts/truncate_sequences.py
        - data/01_raw/datasets_full/${item}
      params:
        - truncate.max_frames
      outs:
        - data/01_raw/datasets/${item}

  build_tubes:
    foreach:
      - train
      - val
    do:
      cmd: >-
        uv run python scripts/build_tubes.py
        --input-dir data/01_raw/datasets/${item}
        --output-dir data/03_primary/tubes/${item}
        --iou-threshold ${tubes.iou_threshold}
        --max-misses ${tubes.max_misses}
        --min-tube-length ${build_tubes.min_tube_length}
        --min-detected-entries ${build_tubes.min_detected_entries}
      deps:
        - scripts/build_tubes.py
        - src/bbox_tube_temporal/tubes.py
        - src/bbox_tube_temporal/data.py
        - src/bbox_tube_temporal/types.py
        - data/01_raw/datasets/${item}
      params:
        - tubes
        - build_tubes
      outs:
        - data/03_primary/tubes/${item}

  build_model_input:
    foreach:
      - train
      - val
    do:
      cmd: >-
        uv run python scripts/build_model_input.py
        --tubes-dir data/03_primary/tubes/${item}
        --raw-dir data/01_raw/datasets/${item}
        --output-dir data/05_model_input/${item}
        --context-factor ${model_input.context_factor}
        --patch-size ${model_input.patch_size}
      deps:
        - scripts/build_model_input.py
        - src/bbox_tube_temporal/model_input.py
        - data/03_primary/tubes/${item}
        - data/01_raw/datasets/${item}
      params:
        - model_input
      outs:
        - data/05_model_input/${item}

  render_tubes:
    foreach:
      - train
      - val
    do:
      cmd: >-
        uv run python scripts/render_tubes.py
        --tubes-dir data/03_primary/tubes/${item}
        --raw-dir data/01_raw/datasets/${item}
        --output-dir data/08_reporting/tubes/${item}
      deps:
        - scripts/render_tubes.py
        - src/bbox_tube_temporal/tubes.py
        - src/bbox_tube_temporal/tube_viz.py
        - src/bbox_tube_temporal/data.py
        - data/03_primary/tubes/${item}
        - data/01_raw/datasets/${item}
      outs:
        - data/08_reporting/tubes/${item}

  train_mean_pool:
    cmd: >-
      uv run python scripts/train.py
      --arch mean_pool
      --train-dir data/05_model_input/train
      --val-dir data/05_model_input/val
      --output-dir data/06_models/mean_pool
      --params-path params.yaml
      --params-key train_mean_pool
    deps:
      - scripts/train.py
      - src/bbox_tube_temporal/augment.py
      - src/bbox_tube_temporal/dataset.py
      - src/bbox_tube_temporal/temporal_classifier.py
      - src/bbox_tube_temporal/lit_temporal.py
      - src/bbox_tube_temporal/training_plots.py
      - data/05_model_input/train
      - data/05_model_input/val
    params:
      - train_mean_pool
      - augment
    outs:
      - data/06_models/mean_pool/best_checkpoint.pt
      - data/06_models/mean_pool/csv_logs/
    plots:
      - data/06_models/mean_pool/plots/training_curves.png

  train_gru:
    cmd: >-
      uv run python scripts/train.py
      --arch gru
      --train-dir data/05_model_input/train
      --val-dir data/05_model_input/val
      --output-dir data/06_models/gru
      --params-path params.yaml
      --params-key train_gru
    deps:
      - scripts/train.py
      - src/bbox_tube_temporal/augment.py
      - src/bbox_tube_temporal/dataset.py
      - src/bbox_tube_temporal/temporal_classifier.py
      - src/bbox_tube_temporal/lit_temporal.py
      - src/bbox_tube_temporal/training_plots.py
      - data/05_model_input/train
      - data/05_model_input/val
    params:
      - train_gru
      - augment
    outs:
      - data/06_models/gru/best_checkpoint.pt
      - data/06_models/gru/csv_logs/
    plots:
      - data/06_models/gru/plots/training_curves.png

  evaluate_mean_pool:
    foreach:
      - train
      - val
    do:
      cmd: >-
        uv run python scripts/evaluate.py
        --arch mean_pool
        --data-dir data/05_model_input/${item}
        --checkpoint data/06_models/mean_pool/best_checkpoint.pt
        --output-dir data/08_reporting/${item}/mean_pool
        --params-path params.yaml
        --params-key train_mean_pool
        --render-tubes-dir data/08_reporting/tubes/${item}
      deps:
        - scripts/evaluate.py
        - src/bbox_tube_temporal/temporal_classifier.py
        - src/bbox_tube_temporal/lit_temporal.py
        - src/bbox_tube_temporal/dataset.py
        - data/06_models/mean_pool/best_checkpoint.pt
        - data/05_model_input/${item}
        - data/08_reporting/tubes/${item}
      params:
        - train_mean_pool
      outs:
        - data/08_reporting/${item}/mean_pool/errors
        - data/08_reporting/${item}/mean_pool/predictions.json:
            cache: false
      metrics:
        - data/08_reporting/${item}/mean_pool/metrics.json:
            cache: false
      plots:
        - data/08_reporting/${item}/mean_pool/pr_curve.png
        - data/08_reporting/${item}/mean_pool/roc_curve.png
        - data/08_reporting/${item}/mean_pool/confusion_matrix.png
        - data/08_reporting/${item}/mean_pool/confusion_matrix_normalized.png

  evaluate_gru:
