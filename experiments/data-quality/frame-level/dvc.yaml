stages:
  prepare:
    matrix:
      model: ${models}
    desc: "Download ${item.model.name} .pt from HuggingFace"
    cmd: >-
      uv run python scripts/prepare.py
      --hf-repo ${item.model.hf_repo}
      --hf-filename ${item.model.hf_filename}
      --output data/01_raw/models/${item.model.name}.pt
    deps:
      - scripts/prepare.py
    params:
      - models
    outs:
      - data/01_raw/models/${item.model.name}.pt:
          cache: false

  predict:
    matrix:
      model: ${models}
      split: [train, val, test]
    desc: "Run YOLO inference with ${item.model.name} on ${item.split}"
    cmd: >-
      uv run python scripts/predict.py
      --model-name ${item.model.name}
      --model-path data/01_raw/models/${item.model.name}.pt
      --split-dir data/01_raw/datasets/${item.split}
      --conf-thresh ${item.model.conf_thresh}
      --output-dir data/07_model_output/${item.model.name}/${item.split}
    deps:
      - scripts/predict.py
      - src/data_quality_frame_level
      - data/01_raw/datasets/${item.split}
      - data/01_raw/models/${item.model.name}.pt
    params:
      - models
    outs:
      - data/07_model_output/${item.model.name}/${item.split}

  build_fiftyone:
    matrix:
      model: ${models}
      split: [train, val, test]
    desc: "Build FiftyOne review dataset for ${item.model.name} on ${item.split}"
    cmd: >-
      uv run --group explore python scripts/build_fiftyone.py
      --dataset-name dq-frame_${item.model.name}_${item.split}
      --split-dir data/01_raw/datasets/${item.split}
      --predictions data/07_model_output/${item.model.name}/${item.split}/predictions.json
      --iou-thresh ${item.model.iou_thresh}
      --sentinel data/fiftyone/${item.model.name}/${item.split}/dataset.json
      --summary data/08_reporting/${item.model.name}/${item.split}/summary.json
    deps:
      - scripts/build_fiftyone.py
      - src/data_quality_frame_level
      - data/01_raw/datasets/${item.split}
      - data/07_model_output/${item.model.name}/${item.split}/predictions.json
    params:
      - models
    outs:
      - data/fiftyone/${item.model.name}/${item.split}/dataset.json
      - data/08_reporting/${item.model.name}/${item.split}/summary.json
