truncate:
  max_frames: 20

prepare:
  model_repo: "pyronear/yolo11s_nimble-narwhal_v6.0.0"
  model_filename: "best.pt"

infer:
  confidence_threshold: 0.01
  iou_nms: 0.2
  image_size: 1024

extract:
  roi_size: 7
  context_factor: 1.2
  max_detections_per_frame: 10

tubes:
  iou_threshold: 0.2
  max_misses: 2

train:
  d_model: 512
  lstm_layers: 2
  lstm_bidirectional: false
  spatial_layers: 4
  spatial_heads: 8
  max_frames: 20
  learning_rate: 0.0001
  weight_decay: 0.01
  epochs: 50
  batch_size: 1
  gradient_accumulation_steps: 8
  sequence_loss_weight: 1.0
  detection_loss_weight: 1.0
  sequence_pos_weight: 5.0
  detection_pos_weight: 40.0
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 5
  freeze_backbone_epochs: 5
  backbone_lr_factor: 0.1
  classification_threshold: 0.5
  seed: 42
