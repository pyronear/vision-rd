stages:
  # --- Truncate imported dataset ---
  truncate:
    foreach:
      - train
      - val
    do:
      desc: "Truncate ${item} sequences to max_frames (imported full dataset)"
      cmd: >-
        uv run python scripts/truncate_sequences.py
        --input-dir data/01_raw/datasets_full/${item}
        --output-dir data/01_raw/datasets/${item}
        --max-frames ${truncate.max_frames}
      deps:
        - scripts/truncate_sequences.py
        - data/01_raw/datasets_full/${item}
      params:
        - truncate.max_frames
      outs:
        - data/01_raw/datasets/${item}

  # --- YOLO Inference ---
  infer:
    foreach:
      - train
      - val
    do:
      desc: "Run YOLO inference on ${item} set images to produce raw smoke detections"
      cmd: >-
        uv run python scripts/infer.py
        --data-dir data/01_raw/datasets/${item}
        --model-path data/01_raw/models/${prepare.model_filename}
        --output-dir data/02_intermediate/${item}
        --confidence-threshold ${infer.confidence_threshold}
        --iou-nms ${infer.iou_nms}
        --image-size ${infer.image_size}
      deps:
        - scripts/infer.py
        - src/mtb_change_detection/data.py
        - src/mtb_change_detection/detector.py
        - src/mtb_change_detection/types.py
        - data/01_raw/datasets/${item}
        - data/01_raw/models/${prepare.model_filename}
      params:
        - prepare.model_filename
        - infer
      outs:
        - data/02_intermediate/${item}

  # --- Pad short sequences ---
  pad:
    foreach:
      - train
      - val
    do:
      desc: "Pad short ${item} sequences by repeating boundary frames"
      cmd: >-
        uv run python scripts/pad_sequences.py
        --infer-dir data/02_intermediate/${item}
        --output-dir data/03_primary/${item}
        --min-sequence-length ${pad.min_sequence_length}
      deps:
        - scripts/pad_sequences.py
        - src/mtb_change_detection/data.py
        - src/mtb_change_detection/detector.py
        - src/mtb_change_detection/types.py
        - data/02_intermediate/${item}
      params:
        - pad
      outs:
        - data/03_primary/${item}

  # --- MTB Change Detection + Tracking ---
  track:
    foreach:
      - train
      - val
    do:
      desc: "Apply MTB change detection + tracking on ${item} set"
      cmd: >-
        uv run python scripts/track.py
        --infer-dir data/03_primary/${item}
        --data-dir data/01_raw/datasets/${item}
        --output-dir data/07_model_output/${item}
        --pixel-threshold ${change.pixel_threshold}
        --min-change-ratio ${change.min_change_ratio}
        --confidence-threshold ${track.confidence_threshold}
        --iou-threshold ${track.iou_threshold}
        --min-consecutive ${track.min_consecutive}
        --max-detection-area ${track.max_detection_area}
        --max-misses ${track.max_misses}
        --use-confidence-filter ${track.use_confidence_filter}
        --min-mean-confidence ${track.min_mean_confidence}
        --use-area-change-filter ${track.use_area_change_filter}
        --min-area-change ${track.min_area_change}
      deps:
        - scripts/track.py
        - src/mtb_change_detection/change_detector.py
        - src/mtb_change_detection/data.py
        - src/mtb_change_detection/detector.py
        - src/mtb_change_detection/tracker.py
        - src/mtb_change_detection/types.py
        - data/03_primary/${item}
        - data/01_raw/datasets/${item}
      params:
        - change
        - track
      outs:
        - data/07_model_output/${item}

  # --- Package ---
  package:
    desc: "Bundle YOLO weights and MTB+tracking config into a single deployable archive"
    cmd: >-
      uv run python scripts/package.py
      --weights-path data/01_raw/models/${prepare.model_filename}
      --params-path params.yaml
      --output-path data/06_models/model.zip
    deps:
      - scripts/package.py
      - src/mtb_change_detection/package.py
      - data/01_raw/models/${prepare.model_filename}
    params:
      - prepare.model_filename
      - infer
      - pad
      - change
      - track
    outs:
      - data/06_models/model.zip

  # --- Evaluate ---
  evaluate:
    foreach:
      val_all:
        split: val
        subset: all
        filter_flag: ""
      train_all:
        split: train
        subset: all
        filter_flag: ""
      val_pyronear:
        split: val
        subset: pyronear
        filter_flag: "--filter-prefix pyronear"
      train_pyronear:
        split: train
        subset: pyronear
        filter_flag: "--filter-prefix pyronear"
    do:
      desc: "Compute sequence-level metrics on ${item.split} set (${item.subset})"
      cmd: >-
        uv run python scripts/evaluate.py
        --track-dir data/07_model_output/${item.split}
        --output-dir data/08_reporting/${item.split}/${item.subset}
        ${item.filter_flag}
      deps:
        - scripts/evaluate.py
        - src/mtb_change_detection/evaluator.py
        - data/07_model_output/${item.split}
      metrics:
        - data/08_reporting/${item.split}/${item.subset}/metrics.json:
            cache: false
      plots:
        - data/08_reporting/${item.split}/${item.subset}/plots

  # --- Sweep ---
  sweep:
    foreach:
      val_all:
        split: val
        subset: all
        filter_flag: ""
      train_all:
        split: train
        subset: all
        filter_flag: ""
      val_pyronear:
        split: val
        subset: pyronear
        filter_flag: "--filter-prefix pyronear"
      train_pyronear:
        split: train
        subset: pyronear
        filter_flag: "--filter-prefix pyronear"
    do:
      desc: "Grid-search MTB+tracking parameters on ${item.split} set (${item.subset})"
      cmd: >-
        uv run python scripts/sweep.py
        --infer-dir data/03_primary/${item.split}
        --data-dir data/01_raw/datasets/${item.split}
        --output-dir data/08_reporting/sweep/${item.split}/${item.subset}
        ${item.filter_flag}
      deps:
        - scripts/sweep.py
        - src/mtb_change_detection/change_detector.py
        - src/mtb_change_detection/evaluator.py
        - src/mtb_change_detection/tracker.py
        - src/mtb_change_detection/types.py
        - data/03_primary/${item.split}
        - data/01_raw/datasets/${item.split}
      outs:
        - data/08_reporting/sweep/${item.split}/${item.subset}
