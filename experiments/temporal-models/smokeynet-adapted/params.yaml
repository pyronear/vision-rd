truncate:
  max_frames: 20

prepare:
  model_repo: "pyronear/yolo11s_nimble-narwhal_v6.0.0"
  model_filename: "best.pt"

infer:
  confidence_threshold: 0.01
  iou_nms: 0.2
  image_size: 1024

extract:
  roi_size: 7
  context_factor: 1.2
  max_detections_per_frame: 10

tubes:
  iou_threshold: 0.2
  max_misses: 2

build_tubes:
  min_tube_length: 4
  min_detected_entries: 2

model_input:
  context_factor: 1.5
  patch_size: 224

train_mean_pool:
  arch: mean_pool
  backbone: resnet18
  hidden_dim: 128
  max_frames: 20
  batch_size: 32
  num_workers: 4
  learning_rate: 0.001
  weight_decay: 0.01
  max_epochs: 30
  early_stop_patience: 5
  seed: 42

train_gru:
  arch: gru
  backbone: resnet18
  hidden_dim: 128
  num_layers: 1
  bidirectional: false
  max_frames: 20
  batch_size: 32
  num_workers: 4
  learning_rate: 0.001
  weight_decay: 0.01
  max_epochs: 30
  early_stop_patience: 5
  seed: 42

