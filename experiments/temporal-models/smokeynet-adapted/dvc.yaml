stages:
  truncate:
    foreach:
      - train
      - val
    do:
      cmd: >-
        uv run python scripts/truncate_sequences.py
        --input-dir data/01_raw/datasets_full/${item}
        --output-dir data/01_raw/datasets/${item}
        --max-frames ${truncate.max_frames}
      deps:
        - scripts/truncate_sequences.py
        - data/01_raw/datasets_full/${item}
      params:
        - truncate.max_frames
      outs:
        - data/01_raw/datasets/${item}

  build_tubes:
    foreach:
      - train
      - val
    do:
      cmd: >-
        uv run python scripts/build_tubes.py
        --input-dir data/01_raw/datasets/${item}
        --output-dir data/03_primary/tubes/${item}
        --iou-threshold ${tubes.iou_threshold}
        --max-misses ${tubes.max_misses}
        --min-tube-length ${build_tubes.min_tube_length}
        --min-detected-entries ${build_tubes.min_detected_entries}
      deps:
        - scripts/build_tubes.py
        - src/smokeynet_adapted/tubes.py
        - src/smokeynet_adapted/data.py
        - src/smokeynet_adapted/types.py
        - data/01_raw/datasets/${item}
      params:
        - tubes
        - build_tubes
      outs:
        - data/03_primary/tubes/${item}

  build_model_input:
    foreach:
      - train
      - val
    do:
      cmd: >-
        uv run python scripts/build_model_input.py
        --tubes-dir data/03_primary/tubes/${item}
        --raw-dir data/01_raw/datasets/${item}
        --output-dir data/05_model_input/${item}
        --context-factor ${model_input.context_factor}
        --patch-size ${model_input.patch_size}
      deps:
        - scripts/build_model_input.py
        - src/smokeynet_adapted/model_input.py
        - data/03_primary/tubes/${item}
        - data/01_raw/datasets/${item}
      params:
        - model_input
      outs:
        - data/05_model_input/${item}

  render_tubes:
    foreach:
      - train
      - val
    do:
      cmd: >-
        uv run python scripts/render_tubes.py
        --tubes-dir data/03_primary/tubes/${item}
        --raw-dir data/01_raw/datasets/${item}
        --output-dir data/08_reporting/tubes/${item}
      deps:
        - scripts/render_tubes.py
        - src/smokeynet_adapted/tubes.py
        - src/smokeynet_adapted/data.py
        - data/03_primary/tubes/${item}
        - data/01_raw/datasets/${item}
      outs:
        - data/08_reporting/tubes/${item}

