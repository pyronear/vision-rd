stages:
  evaluate_fsm_tracking:
    cmd: >-
      uv run python scripts/evaluate.py
      --model-name fsm-tracking-baseline
      --model-type fsm-tracking-baseline
      --model-package data/01_raw/models/fsm-tracking-baseline.zip
      --test-dir data/01_raw/sequential_test/test
      --output-dir data/07_model_output/fsm-tracking-baseline
    deps:
      - scripts/evaluate.py
      - src/temporal_model_leaderboard
      - data/01_raw/sequential_test
      - data/01_raw/models/fsm-tracking-baseline.zip
    outs:
      - data/07_model_output/fsm-tracking-baseline

  evaluate_mtb_change_detection:
    cmd: >-
      uv run python scripts/evaluate.py
      --model-name mtb-change-detection
      --model-type mtb-change-detection
      --model-package data/01_raw/models/mtb-change-detection.zip
      --test-dir data/01_raw/sequential_test/test
      --output-dir data/07_model_output/mtb-change-detection
    deps:
      - scripts/evaluate.py
      - src/temporal_model_leaderboard
      - data/01_raw/sequential_test
      - data/01_raw/models/mtb-change-detection.zip
    outs:
      - data/07_model_output/mtb-change-detection

  evaluate_pyro_detector:
    cmd: >-
      uv run python scripts/evaluate.py
      --model-name pyro-detector-baseline
      --model-type pyro-detector-baseline
      --model-package data/01_raw/models/pyro-detector-baseline.zip
      --test-dir data/01_raw/sequential_test/test
      --output-dir data/07_model_output/pyro-detector-baseline
    deps:
      - scripts/evaluate.py
      - src/temporal_model_leaderboard
      - data/01_raw/sequential_test
      - data/01_raw/models/pyro-detector-baseline.zip
    outs:
      - data/07_model_output/pyro-detector-baseline

  evaluate_bbox_tube_vit_dinov2_finetune:
    cmd: >-
      uv run python scripts/evaluate.py
      --model-name bbox-tube-temporal-vit-dinov2-finetune
      --model-type bbox-tube-temporal
      --model-package data/01_raw/models/bbox-tube-temporal-vit-dinov2-finetune.zip
      --test-dir data/01_raw/sequential_test/test
      --output-dir data/07_model_output/bbox-tube-temporal-vit-dinov2-finetune
    deps:
      - scripts/evaluate.py
      - src/temporal_model_leaderboard
      - data/01_raw/sequential_test
      - data/01_raw/models/bbox-tube-temporal-vit-dinov2-finetune.zip
    outs:
      - data/07_model_output/bbox-tube-temporal-vit-dinov2-finetune

  evaluate_bbox_tube_gru_convnext_finetune:
    cmd: >-
      uv run python scripts/evaluate.py
      --model-name bbox-tube-temporal-gru-convnext-finetune
      --model-type bbox-tube-temporal
      --model-package data/01_raw/models/bbox-tube-temporal-gru-convnext-finetune.zip
      --test-dir data/01_raw/sequential_test/test
      --output-dir data/07_model_output/bbox-tube-temporal-gru-convnext-finetune
    deps:
      - scripts/evaluate.py
      - src/temporal_model_leaderboard
      - data/01_raw/sequential_test
      - data/01_raw/models/bbox-tube-temporal-gru-convnext-finetune.zip
    outs:
      - data/07_model_output/bbox-tube-temporal-gru-convnext-finetune

  leaderboard:
    cmd: >-
      uv run python scripts/leaderboard.py
      --results-dir data/07_model_output
      --output-dir data/08_reporting
    deps:
      - scripts/leaderboard.py
      - src/temporal_model_leaderboard
      - data/07_model_output
    metrics:
      - data/08_reporting/leaderboard.json:
          cache: false
    outs:
      - data/08_reporting/leaderboard.txt
